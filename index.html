<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự Án Sáng Tạo - Responsive & Accessibility</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="grid-container">
        <figure class="grid-item">
            <img src="https://tl.cdnchinhphu.vn/344445545208135680/2023/12/27/3d2aaf8fbf05175b4e14-17036638360421078605523.jpg" alt="Không gian làm việc tối giản với máy tính và cây xanh">
            <figcaption>
                <h2>Phát Triển IoT</h2>
                <p>Hệ thống nhúng và IoT đang định hình tương lai công nghệ, kết nối vạn vật và tối ưu hóa quy trình vận hành tự động.</p>
            </figcaption>
        </figure>

        <figure class="grid-item">
            <img src="https://sumitech.vn/wp-content/uploads/canh-tay-robot.jpg" alt="Cánh tay robot công nghiệp đang lắp ráp linh kiện">
            <figcaption>
                <h2>Robotics & AI</h2>
                <p>Nghiên cứu robot giúp hiểu sâu hơn về điều khiển tự động, thuật toán định vị và tối ưu hóa phần cứng mạch điện tử.</p>
            </figcaption>
        </figure>

        <figure class="grid-item">
            <img src="https://minhtrieu.vn/wp-content/uploads/2025/07/he-thong-dien-dien-tu-cua-robot-4.jpg" alt="Giao diện một trò chơi điện tử ba chiều trên màn hình">
            <figcaption>
                <h2>Lập Trình Game 3D</h2>
                <p>Sử dụng toán học và đồ họa máy tính để xây dựng những thế giới ảo sống động, mang lại trải nghiệm tương tác chân thực.</p>
            </figcaption>
        </figure>
    </main>

</body>
</html>
